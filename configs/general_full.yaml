stopping_step: 5
train_batch_size: 16  #64
eval_batch_size: 256

metrics: ['NDCG', 'Recall', 'Precision', 'HR', 'F1', 'MRR']
topk: [5, 10, 15, 20]


valid_metric: 'NDCG@20'
metric_decimal_place: 4
seed: 2023
reproducibility: True

MAX_ITEM_LIST_LENGTH: 50
hidden_size: 64
embedding_size: 64
top_k: 10
image_feat_dim: 128  # 根据实际npy调整
text_feat_dim: 768   # 根据实际npy调整

n_ui_layers: 2       # LightGCN 层数
n_clusters: 10       # 意图聚类数
temp_cluster: 0.1    # SoftKMeans 温度
sub_time_delta: 3600 # 会话时间阈值
time_scalar: 86400   # 时间缩放 (1天)
emb_dropout_prob: 0.1

normalize_all: False # do not normalize timestamp

eval_args:
    order: TO
    split: { 'LS':'valid_and_test'}
    mode: full

train_neg_sample_args:
    sample_num: 1
loss_type: 'BPR'

intent_kl_threshold: 0.5
full_sort_chunk_size: 256

# Ablation switches (default all enabled)
use_u2u: False
use_i2i: True
use_hgcn: True
use_soft_cluster: True
use_intent_excitation: True
use_short_term_attention: True